<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>NkolsBank</title>
</head>

<body>

    <div id="conteudo">
        <header>
            <img src="favicon.ico" alt="Ícone do App" style="width: 35px;">
            <p style="padding: 8px 5px; font-weight: bolder;">NkolsBank</p>
        </header>

        <section>
            <h1>Olá, Usuário.</h1>
            <p style="padding-top: 10px;">Saldo na conta: R$ 0,00</p>
        </section>

        <nav>
            <div class="div-botao-nav">
                <button class="botao-nav"><img src="icons/calculadora.png" class="nav-icon" alt="Calculadora"></button>
                <p>Calculadora</p>
            </div>
            <div class="div-botao-nav">
                <button class="botao-nav"><img src="icons/pesquisa.png" class="nav-icon" alt="Pesquisa"></button>
                <p>Pesquisa</p>
            </div>
            <div class="div-botao-nav">
                <button class="botao-nav"><img src="icons/estatisticas.png" class="nav-icon" alt="Estatísticas"></button>
                <p>Estatísticas</p>
            </div>
        </nav>
    </div>

</body>

</html>
